<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot 管理后台</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3em;
        }
        
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .status-disconnected { background: #ff4757; color: white; }
        .status-authenticated { background: #ffa502; color: white; }
        .status-qr { background: #2ed573; color: white; }
        .status-ready { background: #1e90ff; color: white; }
        
        #qrImage {
            max-width: 300px;
            display: block;
            margin: 20px auto;
            border: 5px solid #667eea;
            border-radius: 10px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        
        .btn-primary { background: #667eea; color: white; }
        .btn-danger { background: #ff4757; color: white; }
        .btn-success { background: #2ed573; color: white; }
        .btn-warning { background: #ffa502; color: white; }
        .btn-info { background: #3498db; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .chat-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .chat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .chat-item:hover {
            background: #f8f9fa;
        }
        
        .chat-item.selected {
            background: #e8f0fe;
            border-left: 3px solid #667eea;
        }
        
        .chat-name {
            font-weight: 500;
            color: #333;
        }
        
        .chat-preview {
            font-size: 12px;
            color: #888;
        }
        
        .chat-tag {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        
        .tag-group { background: #f0f0f0; color: #666; }
        .tag-private { background: #e8f5e9; color: #2e7d32; }
        
        .messages {
            max-height: 250px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
        }
        
        .message {
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .message.received {
            background: white;
            border-left: 3px solid #667eea;
        }
        
        .message.sent {
            background: #e8f5e9;
            border-right: 3px solid #2ed573;
            text-align: right;
        }
        
        .message-time {
            font-size: 11px;
            color: #888;
        }
        
        .progress-bar {
            width: 100%;
            height: 25px;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }
        
        .list-group {
            border: 1px solid #ddd;
            border-radius: 8px;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
        }
        
        .list-item:last-child {
            border-bottom: none;
        }
        
        .list-item-content {
            flex: 1;
        }
        
        .list-item-title {
            font-weight: 500;
            color: #333;
        }
        
        .list-item-subtitle {
            font-size: 12px;
            color: #888;
        }
        
        .badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .badge-info { background: #d1ecf1; color: #0c5460; }
        
        .tab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: white;
            color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .checkbox-group input {
            width: auto;
        }
        
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #888;
        }
        
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }

        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9fa;
        }

        .file-info {
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 WhatsApp Bot 管理后台</h1>
        
        <div class="card">
            <h2>
                连接状态
                <span id="statusBadge" class="status-badge status-disconnected">未连接</span>
            </h2>
            <div id="qrSection" style="display: none;">
                <p style="text-align: center; margin-bottom: 10px;">请扫码登录</p>
                <img id="qrImage" src="" alt="QR Code">
            </div>
            <div id="connectSection" style="margin-top: 15px;">
                <button class="btn btn-primary" id="connectBtn" onclick="connectWhatsApp()">连接 WhatsApp</button>
            </div>
        </div>
        
        <div class="tab-nav">
            <button class="tab-btn active" onclick="showTab('broadcast')">📢 群发消息</button>
            <button class="tab-btn" onclick="showTab('autoreply')">🤖 自动回复</button>
            <button class="tab-btn" onclick="showTab('schedule')">⏰ 定时任务</button>
            <button class="tab-btn" onclick="showTab('group')">👥 群管理</button>
            <button class="tab-btn" onclick="showTab('chat')">💬 聊天管理</button>
            <button class="tab-btn" onclick="showTab('media')">📎 发送媒体</button>
            <button class="tab-btn" onclick="showTab('sticker')">💫 发送贴纸</button>
            <button class="tab-btn" onclick="showTab('location')">📍 发送位置</button>
            <button class="tab-btn" onclick="showTab('poll')">📊 发送投票</button>
            <button class="tab-btn" onclick="showTab('messages')">📩 消息记录</button>
            <button class="tab-btn" onclick="showTab('search')">🔍 搜索消息</button>
            <button class="tab-btn" onclick="showTab('channel')">📢 频道</button>
            <button class="tab-btn" onclick="showTab('label')">🏷️ 标签管理</button>
            <button class="tab-btn" onclick="showTab('profile')">👤 个人信息</button>
            <button class="tab-btn" onclick="showTab('contact')">👤 联系人查询</button>
            <button class="tab-btn" onclick="showTab('stats')">📊 数据统计</button>
        </div>
        
        <div id="broadcast" class="tab-content active">
            <div class="grid">
                <div class="card">
                    <h2>📢 群发消息</h2>
                    <div class="form-group">
                        <label>消息内容</label>
                        <textarea id="broadcastMessage" placeholder="输入要发送的消息...&#10;使用 {name} 插入联系人名字"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>发送间隔 (毫秒)</label>
                            <input type="number" id="broadcastInterval" value="10000" min="1000" step="1000">
                        </div>
                    </div>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="randomInterval" checked>
                        <label for="randomInterval">随机间隔（更像真人，±30%波动）</label>
                    </div>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="randomizeMsg" checked>
                        <label for="randomizeMsg">随机化消息内容（防检测）</label>
                    </div>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="respectHours" checked>
                        <label for="respectHours">只在合理时间发送（9:00-22:00）</label>
                    </div>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="randomPause" checked>
                        <label for="randomPause">随机暂停（每5-10条休息10-30秒）</label>
                    </div>
                    <div class="form-group">
                        <label>群发对象</label>
                        <select id="targetType" onchange="toggleManualInput()">
                            <option value="chats">已有聊天记录</option>
                            <option value="contacts">所有联系人 (包括未聊天)</option>
                            <option value="nohistory">未聊天联系人 (新好友)</option>
                            <option value="manual">手动输入号码</option>
                        </select>
                    </div>
                    <div id="manualInputSection" style="display: none;">
                        <div class="form-group">
                            <label>手机号码列表 (每行一个，格式: 手机号|姓名)</label>
                            <textarea id="manualNumbers" placeholder="86138xxxxxxx|张三&#10;86139xxxxxxx|李四" rows="5"></textarea>
                        </div>
                    </div>
                    <button class="btn btn-info" onclick="testGetContacts()">测试获取联系人</button>
                    <button class="btn btn-success" onclick="exportContacts()">导出联系人</button>
                    <div id="contactCount" style="margin-top: 10px; font-weight: bold;"></div>
                    
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="excludeGroups" checked>
                        <label for="excludeGroups">排除群组</label>
                    </div>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="personalize" checked>
                        <label for="personalize">自动插入联系人名字 (使用 {name})</label>
                    </div>
                    <button class="btn btn-primary" id="startBroadcast" onclick="startBroadcast()">开始群发</button>
                    <button class="btn btn-danger" id="stopBroadcast" onclick="stopBroadcast()" disabled>停止</button>
                    
                    <div id="broadcastProgress" style="display: none; margin-top: 15px;">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
                        </div>
                        <p id="progressText">准备中...</p>
                    </div>
                </div>
                
                <div class="card">
                    <h2>💬 发送消息</h2>
                    <div class="form-group">
                        <label>选择联系人</label>
                        <select id="chatSelect" onchange="selectChat()">
                            <option value="">-- 选择联系人 --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>消息内容</label>
                        <textarea id="singleMessage" placeholder="输入消息..."></textarea>
                    </div>
                    <button class="btn btn-success" onclick="sendSingleMessage()">发送</button>
                </div>
            </div>
        </div>
        
        <div id="autoreply" class="tab-content">
            <div class="card">
                <h2>🤖 自动回复规则</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>关键词</label>
                        <input type="text" id="arKeyword" placeholder="触发关键词">
                    </div>
                    <div class="form-group">
                        <label>匹配方式</label>
                        <select id="arMatchType">
                            <option value="keyword">包含关键词</option>
                            <option value="exact">完全匹配</option>
                            <option value="regex">正则表达式</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>回复内容</label>
                    <textarea id="arReply" placeholder="自动回复的消息内容..."></textarea>
                </div>
                <button class="btn btn-primary" onclick="addAutoReply()">添加规则</button>
                
                <div class="list-group" style="margin-top: 20px;">
                    <div id="autoReplyList">
                        <div class="empty-state">暂无自动回复规则</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="schedule" class="tab-content">
            <div class="card">
                <h2>⏰ 定时任务</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>任务名称</label>
                        <input type="text" id="taskName" placeholder="任务名称">
                    </div>
                    <div class="form-group">
                        <label>任务类型</label>
                        <select id="taskType" onchange="toggleTaskTime()">
                            <option value="once">执行一次</option>
                            <option value="daily">每天执行</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" id="onceTimeGroup">
                        <label>执行时间</label>
                        <input type="datetime-local" id="taskTime">
                    </div>
                    <div class="form-group" id="dailyTimeGroup" style="display: none;">
                        <label>执行时间 (小时:分钟)</label>
                        <input type="time" id="taskDailyTime" value="09:00">
                    </div>
                </div>
                <div class="form-group">
                    <label>消息内容</label>
                    <textarea id="taskMessage" placeholder="定时发送的消息内容..."></textarea>
                </div>
                <div class="form-group">
                    <label>发送对象</label>
                    <select id="taskTarget">
                        <option value="all">所有聊天</option>
                        <option value="private">仅私聊</option>
                        <option value="groups">仅群组</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="addScheduledTask()">添加任务</button>
                
                <div class="list-group" style="margin-top: 20px;">
                    <div id="scheduledTaskList">
                        <div class="empty-state">暂无定时任务</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="group" class="tab-content">
            <div class="grid">
                <div class="card">
                    <h2>👥 创建群组</h2>
                    <div class="form-group">
                        <label>群组名称</label>
                        <input type="text" id="newGroupName" placeholder="群组名称">
                    </div>
                    <div class="form-group">
                        <label>成员 (手机号，每行一个)</label>
                        <textarea id="newGroupMembers" placeholder="86138xxxx@c.us&#10;86139xxxx@c.us"></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="createGroup()">创建群组</button>
                </div>
                
                <div class="card">
                    <h2>📋 群组管理</h2>
                    <div class="form-group">
                        <label>选择群组</label>
                        <select id="groupSelect" onchange="loadGroupInfo()">
                            <option value="">-- 选择群组 --</option>
                        </select>
                    </div>
                    <div id="groupActions" style="display: none;">
                        <div class="form-group">
                            <label>添加成员 (手机号，每行一个)</label>
                            <textarea id="addGroupMembers" placeholder="86138xxxx@c.us"></textarea>
                        </div>
                        <button class="btn btn-success btn-sm" onclick="addGroupMembers()">添加成员</button>
                        <button class="btn btn-danger btn-sm" onclick="removeGroupMembers()">移除成员</button>
                        <button class="btn btn-warning btn-sm" onclick="leaveGroup()">退出群组</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="chat" class="tab-content">
            <div class="card">
                <h2>💬 聊天管理</h2>
                <div class="form-group">
                    <label>选择聊天</label>
                    <select id="manageChatSelect" onchange="loadChatActions()">
                        <option value="">-- 选择聊天 --</option>
                    </select>
                </div>
                <div id="chatActions" style="display: none;">
                    <button class="btn btn-info btn-sm" onclick="markSeen()">标记已读</button>
                    <button class="btn btn-primary btn-sm" onclick="pinChat(true)">置顶</button>
                    <button class="btn btn-secondary btn-sm" onclick="pinChat(false)">取消置顶</button>
                    <button class="btn btn-warning btn-sm" onclick="archiveChat()">归档</button>
                    <button class="btn btn-success btn-sm" onclick="muteChat()">免打扰</button>
                    <button class="btn btn-danger btn-sm" onclick="unmuteChat()">取消免打扰</button>
                </div>
            </div>
        </div>
        
        <div id="media" class="tab-content">
            <div class="grid">
                <div class="card">
                    <h2>📎 上传媒体文件</h2>
                    <div class="upload-area" onclick="document.getElementById('mediaFile').click()">
                        <p>点击选择文件或拖拽到这里</p>
                        <input type="file" id="mediaFile" style="display: none;" onchange="handleFileSelect(event)">
                    </div>
                    <div id="fileInfo" class="file-info" style="display: none;"></div>
                    <div class="form-group" style="margin-top: 15px;">
                        <label>发送给</label>
                        <select id="mediaChatSelect">
                            <option value="">-- 选择联系人 --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>图片描述 (可选)</label>
                        <input type="text" id="mediaCaption" placeholder="图片描述">
                    </div>
                    <button class="btn btn-primary" onclick="sendMedia()">发送媒体</button>
                </div>
            </div>
        </div>
        
        <div id="messages" class="tab-content">
            <div class="grid">
                <div class="card">
                    <h2>📱 聊天列表</h2>
                    <div class="chat-list" id="chatList">
                        <div class="empty-state">加载中...</div>
                    </div>
                </div>
                
                <div class="card">
                    <h2>📩 接收消息</h2>
                    <div class="messages" id="receivedMessages">
                        <div class="empty-state">等待新消息...</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="contact" class="tab-content">
            <div class="grid">
                <div class="card">
                    <h2>👤 联系人查询</h2>
                    <div class="form-group">
                        <label>输入联系人 ID 或手机号</label>
                        <input type="text" id="contactId" placeholder="86138xxxx@c.us">
                    </div>
                    <button class="btn btn-primary" onclick="lookupContact()">查询</button>
                    
                    <div id="contactInfo" style="margin-top: 20px; display: none;">
                        <div class="form-group">
                            <label>名字</label>
                            <input type="text" id="contactName" readonly>
                        </div>
                        <div class="form-group">
                            <label>昵称</label>
                            <input type="text" id="contactPushname" readonly>
                        </div>
                        <div class="form-group">
                            <label>头像</label>
                            <img id="contactProfilePic" style="max-width: 200px; border-radius: 10px;">
                        </div>
                        <div class="form-group">
                            <label>是否企业号</label>
                            <input type="text" id="contactIsBusiness" readonly>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="stats" class="tab-content">
            <div class="card">
                <h2>📊 数据统计</h2>
                <button class="btn btn-primary" onclick="loadStats()">刷新统计</button>
                <div id="statsContent" style="margin-top: 20px;">
                    <div class="empty-state">点击刷新查看统计</div>
                </div>
            </div>
        </div>
        
        <div id="sticker" class="tab-content">
            <div class="grid">
                <div class="card">
                    <h2>💫 发送贴纸</h2>
                    <div class="form-group">
                        <label>选择联系人</label>
                        <select id="stickerChatSelect">

    <script>
        const socket = io();
        let selectedChat = null;
        
        socket.on('connect', () => {
            console.log('Connected to server');
        });
        
        async function connectWhatsApp() {
            const connectBtn = document.getElementById('connectBtn');
            connectBtn.disabled = true;
            connectBtn.textContent = '连接中...';
            
            try {
                const response = await fetch('/api/connect', {
                    method: 'POST'
                });
                const result = await response.json();
                
                if (!result.success) {
                    alert(result.message);
                    connectBtn.disabled = false;
                    connectBtn.textContent = '连接 WhatsApp';
                }
            } catch (error) {
                console.error('Error connecting:', error);
                alert('连接失败');
                connectBtn.disabled = false;
                connectBtn.textContent = '连接 WhatsApp';
            }
        }
        
        socket.on('status', (data) => {
            updateStatus(data.status, data.qr);
        });
        
        socket.on('message', (data) => {
            addMessage(data);
        });
        
        socket.on('broadcast-progress', (data) => {
            updateBroadcastProgress(data);
        });
        
        socket.on('auto-reply-rules', (data) => {
            renderAutoReplyRules(data.rules);
        });
        
        socket.on('scheduled-tasks', (data) => {
            renderScheduledTasks(data.tasks);
        });

        socket.on('contact-test-progress', (data) => {
            updateContactTestProgress(data);
        });

        socket.on('scheduled-task', (data) => {
            alert(`定时任务 "${data.name}" 已执行，发送了 ${data.sentCount} 条消息`);
        });

        socket.on('auto-reply', (data) => {
            console.log('Auto reply triggered:', data);
        });
        
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            
            const tabsNeedingChats = ['messages', 'group', 'chat', 'media', 'location', 'poll', 'sticker', 'label'];
            if (tabsNeedingChats.includes(tabId)) {
                loadChats();
            }
            
            if (tabId === 'channel') {
                loadChannels();
            }
            
            if (tabId === 'label') {
                loadLabels();
            }
        }
        
        function updateStatus(status, qr) {
            const badge = document.getElementById('statusBadge');
            const qrSection = document.getElementById('qrSection');
            const qrImage = document.getElementById('qrImage');
            const connectSection = document.getElementById('connectSection');
            const connectBtn = document.getElementById('connectBtn');
            
            badge.className = 'status-badge status-' + status;
            badge.textContent = {
                'disconnected': '未连接',
                'authenticated': '验证中',
                'qr': '等待扫码',
                'ready': '已就绪'
            }[status] || status;
            
            // 管理连接按钮显示
            if (status === 'disconnected') {
                connectSection.style.display = 'block';
                connectBtn.disabled = false;
                connectBtn.textContent = '连接 WhatsApp';
            } else {
                connectSection.style.display = 'none';
            }
            
            if (status === 'qr' && qr) {
                qrSection.style.display = 'block';
                qrImage.src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(qr);
            } else {
                qrSection.style.display = 'none';
            }
            
            if (status === 'ready') {
                loadChats();
            }
        }
        
        async function loadChats() {
            const response = await fetch('/api/chats');
            const data = await response.json();
            
            const chatList = document.getElementById('chatList');
            const chatSelect = document.getElementById('chatSelect');
            const groupSelect = document.getElementById('groupSelect');
            const manageChatSelect = document.getElementById('manageChatSelect');
            const mediaChatSelect = document.getElementById('mediaChatSelect');
            const locationChatSelect = document.getElementById('locationChatSelect');
            const pollChatSelect = document.getElementById('pollChatSelect');
            const stickerChatSelect = document.getElementById('stickerChatSelect');
            const labelChatSelect = document.getElementById('labelChatSelect');
            
            if (chatList) {
                chatList.innerHTML = '';
                data.chats.forEach(chat => {
                    const chatItem = document.createElement('div');
                    chatItem.className = 'chat-item';
                    chatItem.innerHTML = `
                        <div>
                            <div class="chat-name">${chat.name || chat.id}</div>
                            <div class="chat-preview">${chat.lastMessage || ''}</div>
                        </div>
                        <span class="chat-tag ${chat.isGroup ? 'tag-group' : 'tag-private'}">
                            ${chat.isGroup ? '群组' : '私聊'}
                        </span>
                    `;
                    chatItem.onclick = () => selectChatItem(chat, chatItem);
                    chatList.appendChild(chatItem);
                });
                
                if (data.chats.length === 0) {
                    chatList.innerHTML = '<div class="empty-state">暂无聊天记录</div>';
                }
            }
            
            [chatSelect, groupSelect, manageChatSelect, mediaChatSelect, locationChatSelect, pollChatSelect, stickerChatSelect, labelChatSelect].forEach(select => {
                if (select) {
                    select.innerHTML = '<option value="">-- 选择 --</option>';
                    data.chats.forEach(chat => {
                        const option = document.createElement('option');
                        option.value = chat.id;
                        option.textContent = chat.name || chat.id;
                        select.appendChild(option);
                    });
                }
            });
        }
        
        function selectChatItem(chat, element) {
            selectedChat = chat;
            document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('selected'));
            element.classList.add('selected');
        }
        
        function selectChat() {
            const chatId = document.getElementById('chatSelect').value;
            selectedChat = { id: chatId };
        }
        
        async function sendSingleMessage() {
            const message = document.getElementById('singleMessage').value;
            if (!selectedChat || !selectedChat.id) {
                alert('请选择联系人');
                return;
            }
            if (!message) {
                alert('请输入消息内容');
                return;
            }
            
            const response = await fetch('/api/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatId: selectedChat.id, message })
            });
            
            const result = await response.json();
            if (result.success) {
                alert('发送成功！');
                document.getElementById('singleMessage').value = '';
            } else {
                alert('发送失败: ' + result.error);
            }
        }
        
        function toggleManualInput() {
            const targetType = document.getElementById('targetType').value;
            document.getElementById('manualInputSection').style.display = targetType === 'manual' ? 'block' : 'none';
        }
        
        async function testGetContacts() {
            const targetType = document.getElementById('targetType').value;
            
            if (targetType === 'manual') {
                const numbersText = document.getElementById('manualNumbers').value;
                const lines = numbersText.split('\n').filter(l => l.trim());
                document.getElementById('contactCount').innerHTML = '<span style="color:green">手动输入 ' + lines.length + ' 个号码</span>';
                return;
            }
            
            if (targetType === 'contacts') {
                const response = await fetch('/api/contacts-list');
                const data = await response.json();
                if (data.error) {
                    document.getElementById('contactCount').innerHTML = '<span style="color:red">错误: ' + data.error + '</span>';
                } else {
                    document.getElementById('contactCount').innerHTML = '<span style="color:green">所有联系人: ' + data.total + ' 个</span>';
                }
            } else if (targetType === 'nohistory') {
                const response = await fetch('/api/contacts-list');
                const data = await response.json();
                if (data.error) {
                    document.getElementById('contactCount').innerHTML = '<span style="color:red">错误: ' + data.error + '</span>';
                } else {
                    const chatsRes = await fetch('/api/chats');
                    const chatsData = await chatsRes.json();
                    
                    // 构建聊天记录的 ID 集合（多种格式）
                    const chatNumbers = new Set();
                    const chatLids = new Set();
                    const chatNames = new Set();
                    
                    if (chatsData.chats) {
                        for (const chat of chatsData.chats) {
                            const chatId = chat.id;
                            if (chatId && typeof chatId === 'string') {
                                const match = chatId.match(/^(\d+)@/);
                                if (match) chatNumbers.add(match[1]);
                                const lidMatch = chatId.match(/^(\d+)@lid/);
                                if (lidMatch) chatLids.add(lidMatch[1]);
                            }
                            if (chat.name) {
                                chatNames.add(chat.name.toLowerCase().trim());
                            }
                        }
                    }
                    
                    const noHistoryCount = data.contacts.filter(c => {
                        const inChatsByLid = c.lid && (chatNumbers.has(c.lid) || chatLids.has(c.lid));
                        const inChatsByNumber = c.number && chatNumbers.has(c.number);
                        const inChatsById = c.id && chatNumbers.has(c.id.split('@')[0]);
                        const nameMatch = c.name ? chatNames.has(c.name.toLowerCase().trim()) : false;
                        
                        return !inChatsByLid && !inChatsByNumber && !inChatsById && !nameMatch;
                    }).length;
                    
                    document.getElementById('contactCount').innerHTML = '<span style="color:green">未聊天联系人: ' + noHistoryCount + ' 个</span>';
                }
            } else {
                // 获取已有聊天
                const response = await fetch('/api/chats');
                const data = await response.json();
                if (data.error) {
                    document.getElementById('contactCount').innerHTML = '<span style="color:red">错误: ' + data.error + '</span>';
                } else {
                    const excludeGroups = document.getElementById('excludeGroups').checked;
                    const count = excludeGroups ? data.chats.filter(c => !c.isGroup).length : data.chats.length;
                    document.getElementById('contactCount').innerHTML = '<span style="color:green">已有聊天: ' + count + ' 个</span>';
                }
            }
        }
        
        function exportContacts() {
            window.open('/api/export-contacts', '_blank');
        }

        async function startContactTestLoop() {
            const maxAttemptsEl = document.getElementById('maxAttempts');
            const testIntervalEl = document.getElementById('testInterval');
            const stopOnSuccessEl = document.getElementById('stopOnSuccess');
            
            if (!maxAttemptsEl || !testIntervalEl || !stopOnSuccessEl) {
                return;
            }
            
            const maxAttempts = parseInt(maxAttemptsEl.value);
            const interval = parseInt(testIntervalEl.value);
            const stopOnSuccess = stopOnSuccessEl.checked;
            
            const response = await fetch('/api/contact-test/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ maxAttempts, interval, stopOnSuccess })
            });
            
            const result = await response.json();
            const startTestLoop = document.getElementById('startTestLoop');
            const stopTestLoop = document.getElementById('stopTestLoop');
            const testStatus = document.getElementById('testStatus');
            
            if (result.success && startTestLoop && stopTestLoop && testStatus) {
                startTestLoop.disabled = true;
                stopTestLoop.disabled = false;
                testStatus.textContent = '运行中...';
            } else if (!result.success) {
                alert('启动失败: ' + result.error);
            }
        }

        async function stopContactTestLoop() {
            const response = await fetch('/api/contact-test/stop', {
                method: 'POST'
            });
            
            const result = await response.json();
            const startTestLoop = document.getElementById('startTestLoop');
            const stopTestLoop = document.getElementById('stopTestLoop');
            const testStatus = document.getElementById('testStatus');
            
            if (result.success && startTestLoop && stopTestLoop && testStatus) {
                startTestLoop.disabled = false;
                stopTestLoop.disabled = true;
                testStatus.textContent = '已停止';
            }
        }

        function updateContactTestProgress(data) {
            // 检查元素是否存在再进行操作
            const testAttempts = document.getElementById('testAttempts');
            if (testAttempts) testAttempts.textContent = data.attempts;
            
            const testStatus = document.getElementById('testStatus');
            const startTestLoop = document.getElementById('startTestLoop');
            const stopTestLoop = document.getElementById('stopTestLoop');
            
            if (testStatus && startTestLoop && stopTestLoop) {
                if (data.running) {
                    testStatus.textContent = '运行中...';
                    startTestLoop.disabled = true;
                    stopTestLoop.disabled = false;
                } else if (data.attempts > 0) {
                    testStatus.textContent = '已停止';
                    startTestLoop.disabled = false;
                    stopTestLoop.disabled = true;
                }
            }
            
            const testResult = document.getElementById('testResult');
            if (testResult && data.lastResult) {
                if (data.lastResult.success) {
                    testResult.innerHTML = 
                        '<span style="color:green">成功! 获取到 ' + data.lastResult.count + ' 个联系人</span>';
                } else if (data.lastResult.error) {
                    testResult.innerHTML = 
                        '<span style="color:red">错误: ' + data.lastResult.error + '</span>';
                } else {
                    testResult.textContent = '0 个联系人';
                }
            }
        }
        
        async function startBroadcast() {
            const message = document.getElementById('broadcastMessage').value;
            const interval = parseInt(document.getElementById('broadcastInterval').value);
            const randomInterval = document.getElementById('randomInterval').checked;
            const randomizeMsg = document.getElementById('randomizeMsg').checked;
            const respectHours = document.getElementById('respectHours').checked;
            const randomPause = document.getElementById('randomPause').checked;
            const excludeGroups = document.getElementById('excludeGroups').checked;
            const personalize = document.getElementById('personalize').checked;
            const targetType = document.getElementById('targetType').value;
            const manualNumbers = document.getElementById('manualNumbers')?.value;
            
            if (!message) {
                alert('请输入消息内容');
                return;
            }
            
            const response = await fetch('/api/broadcast', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, interval, randomInterval, randomizeMsg, respectHours, randomPause, excludeGroups, personalize, targetType, manualNumbers })
            });
            
            const result = await response.json();
            if (!result.success) {
                alert('启动失败: ' + result.error);
            }
        }
        
        async function stopBroadcast() {
            await fetch('/api/broadcast-stop', { method: 'POST' });
        }
        
        function updateBroadcastProgress(data) {
            const progressDiv = document.getElementById('broadcastProgress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const startBtn = document.getElementById('startBroadcast');
            const stopBtn = document.getElementById('stopBroadcast');
            
            if (data.running || data.current > 0) {
                progressDiv.style.display = 'block';
                startBtn.disabled = true;
                stopBtn.disabled = !data.running;
                
                const percent = data.total > 0 ? Math.round((data.current / data.total) * 100) : 0;
                progressFill.style.width = percent + '%';
                progressFill.textContent = percent + '%';
                progressText.textContent = `正在发送: ${data.current} / ${data.total}`;
            } else {
                startBtn.disabled = false;
                stopBtn.disabled = true;
                progressText.textContent = `完成！发送: ${data.results.filter(r => r.status === 'success').length}, 失败: ${data.results.filter(r => r.status === 'failed').length}`;
            }
        }
        
        function addMessage(data) {
            const messagesDiv = document.getElementById('receivedMessages');
            const emptyMsg = messagesDiv.querySelector('.empty-state');
            if (emptyMsg) emptyMsg.remove();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message received';
            const time = new Date(data.timestamp * 1000).toLocaleTimeString();
            msgDiv.innerHTML = `
                <strong>${data.name || data.from}</strong>
                <span class="message-time">${time}</span>
                <br>${data.body || '[消息类型: ' + data.type + ']'}
            `;
            messagesDiv.insertBefore(msgDiv, messagesDiv.firstChild);
            
            if (messagesDiv.children.length > 50) {
                messagesDiv.removeChild(messagesDiv.lastChild);
            }
        }
        
        async function addAutoReply() {
            const keyword = document.getElementById('arKeyword').value;
            const reply = document.getElementById('arReply').value;
            const matchType = document.getElementById('arMatchType').value;
            
            if (!keyword || !reply) {
                alert('请填写关键词和回复内容');
                return;
            }
            
            const response = await fetch('/api/auto-reply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ keyword, reply, matchType })
            });
            
            const result = await response.json();
            if (result.success) {
                document.getElementById('arKeyword').value = '';
                document.getElementById('arReply').value = '';
                loadAutoReplyRules();
            } else {
                alert('添加失败: ' + result.error);
            }
        }
        
        async function loadAutoReplyRules() {
            const response = await fetch('/api/auto-reply');
            const data = await response.json();
            renderAutoReplyRules(data.rules);
        }
        
        function renderAutoReplyRules(rules) {
            const list = document.getElementById('autoReplyList');
            if (!rules || rules.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无自动回复规则</div>';
                return;
            }
            
            list.innerHTML = rules.map(rule => `
                <div class="list-item">
                    <div class="list-item-content">
                        <div class="list-item-title">${rule.keyword} <span class="badge badge-info">${rule.matchType}</span></div>
                        <div class="list-item-subtitle">回复: ${rule.reply}</div>
                    </div>
                    <div>
                        <button class="btn btn-sm ${rule.enabled ? 'btn-warning' : 'btn-secondary'}" onclick="toggleAutoReply(${rule.id}, ${!rule.enabled})">
                            ${rule.enabled ? '禁用' : '启用'}
                        </button>
                        <button class="btn btn-danger btn-sm" onclick="deleteAutoReply(${rule.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function toggleAutoReply(id, enabled) {
            await fetch(`/api/auto-reply/${id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled })
            });
            loadAutoReplyRules();
        }
        
        async function deleteAutoReply(id) {
            await fetch(`/api/auto-reply/${id}`, { method: 'DELETE' });
            loadAutoReplyRules();
        }
        
        function toggleTaskTime() {
            const type = document.getElementById('taskType').value;
            document.getElementById('onceTimeGroup').style.display = type === 'once' ? 'block' : 'none';
            document.getElementById('dailyTimeGroup').style.display = type === 'daily' ? 'block' : 'none';
        }
        
        async function addScheduledTask() {
            const name = document.getElementById('taskName').value;
            const type = document.getElementById('taskType').value;
            const time = document.getElementById('taskTime').value;
            const dailyTime = document.getElementById('taskDailyTime').value;
            const message = document.getElementById('taskMessage').value;
            const targetType = document.getElementById('taskTarget').value;
            
            if (!name || !message) {
                alert('请填写任务名称和消息内容');
                return;
            }
            
            const taskData = {
                name,
                type,
                message,
                targetType
            };
            
            if (type === 'once' && time) {
                taskData.time = time;
            } else if (type === 'daily' && dailyTime) {
                const [hour, minute] = dailyTime.split(':');
                taskData.hour = parseInt(hour);
                taskData.minute = parseInt(minute);
            }
            
            const response = await fetch('/api/scheduled-tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(taskData)
            });
            
            const result = await response.json();
            if (result.success) {
                alert('任务添加成功！');
                document.getElementById('taskName').value = '';
                document.getElementById('taskMessage').value = '';
                loadScheduledTasks();
            } else {
                alert('添加失败: ' + result.error);
            }
        }
        
        async function loadScheduledTasks() {
            const response = await fetch('/api/scheduled-tasks');

        function renderScheduledTasks(tasks) {
            const list = document.getElementById('scheduledTaskList');
            if (!tasks || tasks.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无定时任务</div>';
                return;
            }
            
            list.innerHTML = tasks.map(task => `
                <div class="list-item">
                    <div class="list-item-content">
                        <div class="list-item-title">${task.name}</div>
                        <div class="list-item-subtitle">
                            ${task.type === 'once' ? '执行时间: ' + task.time : '每天 ' + task.hour + ':' + String(task.minute).padStart(2, '0')}
                            | 发送对象: ${task.targetType}
                        </div>
                    </div>
                    <button class="btn btn-danger btn-sm" onclick="deleteScheduledTask(${task.id})">删除</button>
                </div>
            `).join('');
        }

        let selectedFile = null;
        
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            selectedFile = file;

            document.getElementById('fileInfo').textContent = `已选择: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;

        async function sendMedia() {
            const chatId = document.getElementById('mediaChatSelect').value;
            const caption = document.getElementById('mediaCaption').value;
            
            if (!chatId || !selectedFile) {
                alert('请选择联系人和文件');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = async function() {
                const base64 = reader.result.split(',')[1];
                
                const uploadResponse = await fetch('/api/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fileName: selectedFile.name,
                        base64Data: base64,
                        mimeType: selectedFile.type
                    })
                });
                
                const uploadResult = await uploadResponse.json();
                if (!uploadResult.success) {
                    alert('上传失败: ' + uploadResult.error);
                    return;
                }
                
                const sendResponse = await fetch('/api/send-media', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatId, caption })
                });
                
                const sendResult = await sendResponse.json();
                if (sendResult.success) {
                    alert('发送成功！');
                    selectedFile = null;
                    document.getElementById('fileInfo').style.display = 'none';
                    document.getElementById('mediaCaption').value = '';
                } else {
                    alert('发送失败: ' + sendResult.error);
                }
            };
            reader.readAsDataURL(selectedFile);
        }

        async function searchMessages() {
            const query = document.getElementById('searchQuery').value;
            if (!query) {
                alert('请输入搜索关键词');
                return;
            }
            
            const response = await fetch(`/api/search-messages?query=${encodeURIComponent(query)}`);
            const data = await response.json();
            
            if (data.error) {
                alert('搜索失败: ' + data.error);
                return;
            }
            
            const results = data.results;
            if (results.length === 0) {
                document.getElementById('searchResults').innerHTML = '<div class="empty-state">未找到结果</div>';
                return;
            }
            
            let html = '<div class="list-group">';
            results.forEach(r => {
                const time = new Date(r.timestamp * 1000).toLocaleString();
                html += `
                    <div class="list-item">
                        <div class="list-item-content">
                            <div class="list-item-title">${r.chatName}</div>
                            <div class="list-item-subtitle">${r.body}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById('searchResults').innerHTML = html;
        }

        function addMessage(data) {
            const messagesDiv = document.getElementById('receivedMessages');
            const emptyMsg = messagesDiv.querySelector('.empty-state');
            if (emptyMsg) emptyMsg.remove();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message received';
            const time = new Date(data.timestamp * 1000).toLocaleTimeString();
            msgDiv.innerHTML = `
                <strong>${data.name || data.from}</strong>
                <span class="message-time">${time}</span>
                <br>${data.body || '[消息类型: ' + data.type + ']'}
            `;
            messagesDiv.insertBefore(msgDiv, messagesDiv.firstChild);
            
            if (messagesDiv.children.length > 50) {
                messagesDiv.removeChild(messagesDiv.lastChild);
            }
        }
